name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: koppajs-website-production
  cancel-in-progress: false

jobs:
  release:
    name: Release and FTP Deploy
    runs-on: ubuntu-latest
    environment: production
    env:
      HUSKY: 0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js from .nvmrc
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run release checks
        run: npm run release:check

      - name: Build deploy artifact
        run: VITE_BASE_PATH=/ npm run build

      - name: Prepare deploy assets
        run: npm run deploy:prepare

      - name: Verify deploy artifact
        run: |
          test -f dist/index.html
          test -f dist/.htaccess

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy via plain FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
        run: |
          set -euo pipefail

          : "${FTP_HOST:?Missing FTP_HOST secret}"
          : "${FTP_USERNAME:?Missing FTP_USERNAME secret}"
          : "${FTP_PASSWORD:?Missing FTP_PASSWORD secret}"
          : "${FTP_REMOTE_DIR:?Missing FTP_REMOTE_DIR secret}"

          lftp <<EOF
          set ftp:ssl-allow no
          set net:max-retries 2
          set net:timeout 30
          open -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_HOST"
          mirror --reverse --delete --verbose --parallel=4 --exclude-glob .ftpquota --exclude-glob .well-known --exclude-glob ".well-known/**" dist/ "$FTP_REMOTE_DIR"
          bye
          EOF
